---
- name: Configure chroot environment
  hosts: all
  vars:
    ansible_ssh_user: root
    cpu_microcode_package: "{{ 'intel-ucode' if cpu_vendor == 'intel' else 'amd-ucode' }}"
  tasks:
    - name: Link localtime
      file:
        src: /mnt/usr/share/zoneinfo/Europe/Madrid
        dest: /mnt/etc/localtime
        state: link

    - name: Configure localtime
      command: arch-chroot /mnt bash -c 'hwclock --systohc'

    - name: Configure locale gen
      lineinfile:
        path: /mnt/etc/locale.gen
        line: "es_ES.UTF-8 UTF-8"
        regexp: "^es_ES "
        insertafter: "^#es_ES.UTF-8 UTF-8"

    - name: Execute locale-gen
      command: arch-chroot /mnt bash -c 'locale-gen'

    - name: Configure locale conf
      lineinfile:
        path: /mnt/etc/locale.conf
        create: true
        line: "LANG=es_ES.utf8"
        regexp: "^LANG=es_ES.utf8"

    - name: Configure vconsole
      lineinfile:
        path: /mnt/etc/vconsole.conf
        create: true
        line: "KEYMAP=es"
        regexp: "^KEYMAP=es"

    - name: Configure hostname
      lineinfile:
        path: /mnt/etc/hostname
        create: true
        line: "{{ inventory_hostname }}"
        regexp: "^{{ inventory_hostname }}$"

    - name: Install lvm2 xfsprogs
      command: arch-chroot /mnt bash -c 'pacman -S --noconfirm --needed lvm2 xfsprogs'

    - name: Configure mkinitcpio
      lineinfile:
        path: /mnt/etc/mkinitcpio.conf
        line: "HOOKS=(base systemd autodetect microcode modconf kms keyboard keymap sd-vconsole block sd-encrypt lvm2 resume filesystems fsck)"
        regexp: '^HOOKS=\('

    - name: Execute mkinitcpio
      command: arch-chroot /mnt bash -c 'mkinitcpio -p linux'

    - name: Install microcode
      command: arch-chroot /mnt bash -c 'pacman -S --noconfirm --needed {{ cpu_microcode_package }}'

    - name: Install efibootmgr
      command: arch-chroot /mnt bash -c 'pacman -S --noconfirm --needed efibootmgr'

    - name: Create EFI Linux directory
      file:
        path: /mnt/boot/EFI/Linux
        state: directory
        mode: "0755"

    - name: Copy vmlinuz to EFI
      command: cp /mnt/boot/vmlinuz-linux /mnt/boot/EFI/Linux/

    - name: Copy initramfs to EFI
      command: cp /mnt/boot/initramfs-linux.img /mnt/boot/EFI/Linux/

    - name: Copy initramfs fallback to EFI
      command: cp /mnt/boot/initramfs-linux-fallback.img /mnt/boot/EFI/Linux/
      ignore_errors: yes

    - name: Create EFI boot entry
      command: >
        arch-chroot /mnt efibootmgr --create
        --disk {{ disk_name }}
        --part 1
        --label "Arch Linux"
        --loader "EFI\\Linux\\vmlinuz-linux"
        --unicode "root=/dev/mapper/Vol-root rw rd.luks.name={{ luks_device.uuid }}=cryptlvm rd.luks.options=discard initrd=EFI\\Linux\\initramfs-linux.img"

    - name: Create efistub-update.path systemd file
      copy:
        dest: /mnt/etc/systemd/system/efistub-update.path
        content: |
          [Unit]
          Description=Copy EFISTUB Kernel to EFI system partition

          [Path]
          PathChanged=/boot/initramfs-linux-fallback.img

          [Install]
          WantedBy=multi-user.target
          WantedBy=system-update.target
        mode: '0644'

    - name: Create efistub-update.service systemd file
      copy:
        dest: /mnt/etc/systemd/system/efistub-update.service
        content: |
          [Unit]
          Description=Copy EFISTUB Kernel to EFI system partition

          [Service]
          Type=oneshot
          ExecStart=/usr/bin/cp -af /boot/vmlinuz-linux /boot/EFI/Linux/
          ExecStart=/usr/bin/cp -af /boot/initramfs-linux.img /boot/EFI/Linux/
          ExecStart=/usr/bin/cp -af /boot/initramfs-linux-fallback.img /boot/EFI/Linux/
        mode: '0644'

    - name: Enable efistub-update.path service
      command: arch-chroot /mnt systemctl enable efistub-update.path

    - name: Install required packages
      command: arch-chroot /mnt bash -c 'pacman -S --noconfirm --needed openssh python vim iwd linux-headers'

    - name: Set root password
      command: "arch-chroot /mnt bash -c 'echo root:{{ root_password_hash }} | chpasswd -e'"
