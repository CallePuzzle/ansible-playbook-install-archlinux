---
- name: Configure chroot environment
  hosts: all
  vars:
    ansible_ssh_user: root
    cpu_microcode_package: "{{ 'intel-ucode' if cpu_vendor == 'intel' else 'amd-ucode' }}"
    # VG name configurable por host_vars, default "Vol"
    vg_name: "{{ lvm_vg_name | default('Vol') }}"
  tasks:
    - name: Link localtime
      file:
        src: /mnt/usr/share/zoneinfo/Europe/Madrid
        dest: /mnt/etc/localtime
        state: link

    - name: Configure localtime
      command: arch-chroot /mnt bash -c 'hwclock --systohc'

    - name: Configure locale gen
      lineinfile:
        path: /mnt/etc/locale.gen
        line: "es_ES.UTF-8 UTF-8"
        regexp: "^es_ES "
        insertafter: "^#es_ES.UTF-8 UTF-8"

    - name: Execute locale-gen
      command: arch-chroot /mnt bash -c 'locale-gen'

    - name: Configure locale conf
      lineinfile:
        path: /mnt/etc/locale.conf
        create: true
        line: "LANG=es_ES.utf8"
        regexp: "^LANG=es_ES.utf8"

    - name: Configure vconsole
      lineinfile:
        path: /mnt/etc/vconsole.conf
        create: true
        line: "KEYMAP=es"
        regexp: "^KEYMAP=es"

    - name: Configure hostname
      lineinfile:
        path: /mnt/etc/hostname
        create: true
        line: "{{ inventory_hostname }}"
        regexp: "^{{ inventory_hostname }}$"

    - name: Install required packages
      command: arch-chroot /mnt bash -c 'pacman -S --noconfirm --needed lvm2 xfsprogs linux-headers dkms'

    - name: Configure mkinitcpio for GRUB + LUKS
      lineinfile:
        path: /mnt/etc/mkinitcpio.conf
        line: "HOOKS=(base udev autodetect microcode modconf kms keyboard keymap consolefont block encrypt lvm2 resume filesystems fsck)"
        regexp: '^HOOKS=\('

    - name: Execute mkinitcpio
      command: arch-chroot /mnt bash -c 'mkinitcpio -p linux'

    - name: Install microcode
      command: arch-chroot /mnt bash -c 'pacman -S --noconfirm --needed {{ cpu_microcode_package }}'

    # GRUB Installation
    - name: Install GRUB and dependencies
      command: arch-chroot /mnt bash -c 'pacman -S --noconfirm --needed grub efibootmgr'

    - name: Ensure EFI directory exists
      file:
        path: /mnt/boot/efi
        state: directory
        mode: "0755"

    - name: Mount EFI partition
      mount:
        src: "{{ efi_partition }}"
        path: "/mnt/boot/efi"
        fstype: "vfat"
        state: mounted

    - name: Get LUKS device UUID
      ansible.builtin.command: "cryptsetup luksUUID {{ luks_partition }}"
      register: luks_uuid_output
      changed_when: false

    - name: Configure GRUB for LUKS
      copy:
        dest: /mnt/etc/default/grub
        content: |
          GRUB_DEFAULT=0
          GRUB_TIMEOUT=5
          GRUB_DISTRIBUTOR="Arch"
          GRUB_CMDLINE_LINUX_DEFAULT="loglevel=3 quiet"
          GRUB_CMDLINE_LINUX="cryptdevice=UUID={{ luks_device.uuid | default(luks_uuid_output.stdout) }}:{{ luks_device.name }} root=/dev/mapper/{{ vg_name }}-root resume=/dev/mapper/{{ vg_name }}-swap rd.luks.options=discard"
          GRUB_PRELOAD_MODULES="part_gpt part_msdos"
          GRUB_ENABLE_CRYPTODISK=y

    - name: Install GRUB EFI
      command: arch-chroot /mnt grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=GRUB --recheck

    - name: Generate GRUB config
      command: arch-chroot /mnt grub-mkconfig -o /boot/grub/grub.cfg

    - name: Install basic packages
      command: arch-chroot /mnt bash -c 'pacman -S --noconfirm --needed openssh python vim iwd'

    - name: Set root password
      command: "arch-chroot /mnt bash -c 'echo root:{{ root_password_hash }} | chpasswd -e'"
