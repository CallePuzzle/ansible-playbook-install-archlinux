---
- name: Install AUR packages
  hosts: all
  vars:
    aur_packages:
      - yay
  tasks:
    - name: Check if yay is installed
      ansible.builtin.command: which yay
      register: yay_check
      failed_when: false
      changed_when: false

    - name: Install yay using makepkg
      kewlfft.aur.aur:
        name: yay
        state: present
        use: makepkg
      become: yes
      become_user: "{{ ansible_ssh_user }}"
      when: yay_check.rc != 0

    - name: Install AUR packages
      kewlfft.aur.aur:
        name: "{{ item }}"
        state: present
        use: yay
        update_cache: yes
      become: yes
      become_user: "{{ ansible_ssh_user }}"
      loop: "{{ aur_packages }}"
      when: item != 'yay'
