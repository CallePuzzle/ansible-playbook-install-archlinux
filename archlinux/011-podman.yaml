---
- name: Install and configure Podman
  hosts: all
  become: yes
  become_method: sudo
  tags:
    - podman
  tasks:
    - name: Install Podman packages
      ansible.builtin.pacman:
        name:
          - podman
          - netavark
          - aardvark-dns
          - podman-docker
          - passt
          - slirp4netns
          - fuse-overlayfs
        state: present
      tags:
        - packages

    - name: Configure unqualified search registries
      ansible.builtin.copy:
        dest: /etc/containers/registries.conf.d/10-unqualified-search-registries.conf
        content: |
          unqualified-search-registries = ["docker.io"]
        mode: '0644'
      tags:
        - configuration

    - name: Check if user already has subuid entry
      ansible.builtin.shell: "grep -q '^{{ user_name }}:' /etc/subuid && echo 'exists' || echo 'missing'"
      register: subuid_check
      changed_when: false
      check_mode: no

    - name: Configure subuid for user
      ansible.builtin.command:
        cmd: "usermod --add-subuids 100000-165535 {{ user_name }}"
      when: subuid_check.stdout == 'missing'
      changed_when: true

    - name: Check if user already has subgid entry
      ansible.builtin.shell: "grep -q '^{{ user_name }}:' /etc/subgid && echo 'exists' || echo 'missing'"
      register: subgid_check
      changed_when: false
      check_mode: no

    - name: Configure subgid for user
      ansible.builtin.command:
        cmd: "usermod --add-subgids 100000-165535 {{ user_name }}"
      when: subgid_check.stdout == 'missing'
      changed_when: true

    - name: Enable podman socket for user
      ansible.builtin.systemd:
        name: podman.socket
        enabled: yes
        scope: user
      become: yes
      become_user: "{{ user_name }}"

    - name: Check if podman-restart service exists
      ansible.builtin.stat:
        path: /usr/lib/systemd/system/podman-restart.service
      register: podman_restart_service

    - name: Enable podman-restart service for containers with restart policy
      ansible.builtin.systemd:
        name: podman-restart.service
        enabled: yes
      when: podman_restart_service.stat.exists

    - name: Check kernel.unprivileged_userns_clone value
      ansible.builtin.command:
        cmd: sysctl -n kernel.unprivileged_userns_clone
      register: userns_clone_value
      changed_when: false
      check_mode: no

    - name: Enable unprivileged user namespaces
      ansible.posix.sysctl:
        name: kernel.unprivileged_userns_clone
        value: '1'
        state: present
        reload: yes
      when: userns_clone_value.stdout == '0'

    - name: Run podman system migrate if subuid/subgid changed
      ansible.builtin.command:
        cmd: podman system migrate
      become: yes
      become_user: "{{ user_name }}"
      when: 
        - subuid_check.stdout == 'missing' or subgid_check.stdout == 'missing'
      changed_when: true
